<div 
  *ngIf="showIntro" 
  class="intro-overlay" 
  [class.fade-out]="isFadingOut"
>
  <video 
    #introVideo
    class="intro-video" 
    src="/videos/intro.mp4" 
    autoplay 
    muted 
    playsinline
    (ended)="onVideoEnded()"
    (error)="onVideoError()"
  >
  </video>
  
  <button class="skip-button" (click)="skipIntro()">
    Skip Animation
  </button>
</div>
